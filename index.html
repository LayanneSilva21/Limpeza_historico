<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Limpeza Pro</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #343a40; --purple: #6f42c1; --teal: #20c997; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .header-info { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; }
        #txt-data { font-size: 14px; color: #666; margin-bottom: 5px; text-transform: capitalize; }
        #txt-hora { font-size: 26px; font-weight: bold; color: var(--primary); }

        h2, h3, h4 { text-align: center; color: var(--dark); margin-top: 0; }
        .secao { display: none; }
        .ativa { display: block; }

        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.2s; color: white; }
        button:active { transform: scale(0.98); }
        .btn-main { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-teal { background: var(--teal); }
        .btn-purple { background: var(--purple); }
        .btn-warning { background: var(--warning); color: #333; }

        #lista-geral, #minhas-tarefas { max-height: 400px; overflow-y: auto; padding-right: 5px; margin-top: 10px; }
        #lista-geral::-webkit-scrollbar, #minhas-tarefas::-webkit-scrollbar { width: 6px; }
        #lista-geral::-webkit-scrollbar-thumb, #minhas-tarefas::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .aba-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 5; }
        .aba { padding: 10px 18px; background: #e9ecef; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 600; color: #555; text-align: center; }
        .aba span { display: block; font-size: 10px; font-weight: normal; opacity: 0.8; }
        .aba.ativa { background: var(--primary); color: white; }

        /* --- MELHORIA DOS CARDS --- */
        .card { 
            background: #fff; 
            border-left: 8px solid #ddd; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            display: flex; 
            align-items: center; 
            gap: 12px;
            border: 1px solid #eee;
        }
        .card.pendente { border-left-color: #ddd; }
        .card.andamento { border-left-color: var(--warning); background-color: #fffef0; }
        /* Borda verde mais grossa como solicitado */
        .card.concluido { border-left: 12px solid var(--success); background-color: #f8fdf9; }
        
        .info-tarefa { flex-grow: 1; display: flex; flex-direction: column; }
        
        .badge-data-dark {
            background: #343a40;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            width: fit-content;
            margin-bottom: 6px;
        }

        .badge-status-pill {
            display: inline-flex;
            align-items: center;
            background-color: #eeeeee;
            color: #2c5282; /* Azul escuro para o texto concluído */
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 8px;
            width: fit-content;
            text-transform: uppercase;
        }

        .info-tarefa strong { font-size: 16px; color: #222; }
        .info-tarefa span { font-size: 14px; color: #555; }
        .cronometro { font-family: 'Courier New', monospace; font-size: 16px; color: var(--danger); font-weight: bold; margin-top: 5px; }

        .btn-circular { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border: 1px solid #ddd; color: #333; font-size: 18px; cursor: pointer; }
        .img-anexo { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-top: 10px; border: 2px solid #ddd; cursor: pointer; }

        .admin-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; margin-bottom: 20px; }
        .filtros-admin { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        #modal-foto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        #modal-foto img { max-width: 90%; max-height: 90%; border-radius: 8px; border: 3px solid white; }
    </style>
</head>
<body>

<div id="modal-foto" onclick="this.style.display='none'"><img id="img-zoom" src=""></div>

<div class="container">
    <div class="header-info">
        <div id="txt-data">--/--/----</div>
        <div id="txt-hora">00:00:00</div>
    </div>

    <div id="tela-login" class="secao ativa">
        <h2>🔑 Acesso ao Sistema</h2>
        <select id="select-user">
            <option value="admin">Administrador</option>
            <option value="Ana">Ana</option><option value="Beatriz">Beatriz</option>
            <option value="Claudio">Claudio</option><option value="Emilia">Emilia</option>
            <option value="Fabiano">Fabiano</option><option value="Irlana">Irlana</option>
            <option value="Jailma">Jailma</option><option value="Marciana">Marciana</option>
        </select>
        <input type="password" id="senha" placeholder="Digite sua senha">
        <button class="btn-main" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
    </div>

    <div id="painel-admin" class="secao">
        <h3>⚙️ Gestão Operacional</h3>
        <div class="admin-box">
            <h4>Cadastrar Nova Tarefa</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <select id="adm-andar">
                    <option>Térreo</option><option>1º Andar</option><option>2º Andar</option>
                    <option>3º Andar</option><option>4º Andar</option><option>Copa/Refeitório</option>
                </select>
                <select id="adm-dia" onchange="atualizarPreviewData()">
                    <option>Segunda</option><option>Terça</option><option>Quarta</option>
                    <option>Quinta</option><option>Sexta</option><option>Sábado</option><option>Domingo</option>
                </select>
            </div>
            <p id="preview-data" style="font-size: 11px; text-align: center; color: var(--primary); margin: 5px 0 0 0;"></p>
            <input type="text" id="adm-tarefa" placeholder="O que deve ser feito?">
            <select id="adm-func">
                <option>Ana</option><option>Beatriz</option><option>Claudio</option>
                <option>Emilia</option><option>Fabiano</option><option>Irlana</option>
                <option>Jailma</option><option>Marciana</option>
            </select>
            <button class="btn-success" onclick="adicionarTarefa()">ADICIONAR NA ESCALA</button>
        </div>

        <div class="admin-box">
            <h4>Relatório de Tarefas</h4>
            <div class="filtros-admin">
                <select id="filtro-func" onchange="renderAdmin()"><option value="todos">Todos</option><option>Ana</option><option>Beatriz</option><option>Claudio</option><option>Emilia</option><option>Fabiano</option><option>Irlana</option><option>Jailma</option><option>Marciana</option></select>
                <select id="filtro-dia" onchange="renderAdmin()"><option value="todos">Todos Dias</option><option>Segunda</option><option>Terça</option><option>Quarta</option><option>Quinta</option><option>Sexta</option><option>Sábado</option><option>Domingo</option></select>
                <select id="filtro-status" onchange="renderAdmin()"><option value="todos">Status</option><option value="Pendente">Pendente</option><option value="Em andamento">Em andamento</option><option value="Concluído">Concluído</option></select>
            </div>
            <div id="lista-geral"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-teal" onclick="exportarCSV()">📊 Exportar CSV</button>
            <button class="btn-purple" onclick="novaSemana()">♻️ Nova Semana</button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button class="btn-warning" onclick="resetarSenhas()">🔑 Resetar Senhas</button>
            <button class="btn-danger" onclick="limparBanco()">🔄 Resetar Tudo</button>
        </div>
        <button style="background:#6c757d; margin-top: 15px;" onclick="location.reload()">SAIR</button>
    </div>

    <div id="painel-func" class="secao">
        <h2 id="boas-vindas"></h2>
        <div class="aba-container" id="abas-dias"></div>
        <div id="minhas-tarefas"></div>
        <button style="background:#6c757d; margin-top: 20px;" onclick="location.reload()">SAIR</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_limpeza_pro')) || { tarefas: [], usuarios: [] };
    let userAtivo = "";
    let diaAtivoFunc = "Segunda";
    const diasSemana = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado", "Domingo"];

    function obterDataDoDia(nomeDia) {
        const hoje = new Date();
        const numHoje = hoje.getDay(); 
        const mapaDias = { "Domingo": 0, "Segunda": 1, "Terça": 2, "Quarta": 3, "Quinta": 4, "Sexta": 5, "Sábado": 6 };
        const alvo = mapaDias[nomeDia];
        let diferenca = alvo - numHoje;
        const resultado = new Date(hoje);
        resultado.setDate(hoje.getDate() + diferenca);
        return resultado.toLocaleDateString('pt-BR');
    }

    function atualizarPreviewData() {
        const diaSel = document.getElementById('adm-dia').value;
        const preview = document.getElementById('preview-data');
        if(preview) preview.innerText = "Data: " + obterDataDoDia(diaSel);
    }

    setInterval(() => {
        const agora = new Date();
        const elData = document.getElementById('txt-data');
        const elHora = document.getElementById('txt-hora');
        if(elData) elData.innerText = agora.toLocaleDateString('pt-BR', { dateStyle: 'full' });
        if(elHora) elHora.innerText = agora.toLocaleTimeString('pt-BR');
        if(userAtivo && userAtivo !== 'admin') atualizarCronometrosVisuais();
    }, 1000);

    function falar(texto) {
        const synth = window.speechSynthesis;
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'pt-BR';
        synth.speak(msg);
    }

    function fazerLogin() {
        const user = document.getElementById('select-user').value;
        const pass = document.getElementById('senha').value;
        if(!pass) return alert("Digite a senha.");
        if(user === 'admin' && pass === '813147') return abrirSessao('admin');

        let conta = db.usuarios.find(u => u.nome === user);
        if(!conta) {
            if(confirm(`Cadastrar senha para ${user}?`)) {
                db.usuarios.push({ nome: user, senha: pass });
                salvarNoDisco(); abrirSessao(user);
            }
        } else if(conta.senha === pass) {
            abrirSessao(user);
        } else { alert("Senha incorreta!"); }
    }

    function abrirSessao(user) {
        userAtivo = user;
        document.getElementById('tela-login').classList.remove('ativa');
        if(user === 'admin') {
            document.getElementById('painel-admin').classList.add('ativa');
            atualizarPreviewData();
            renderAdmin();
        } else {
            document.getElementById('painel-func').classList.add('ativa');
            document.getElementById('boas-vindas').innerText = `Olá, ${user}, Essas são suas tarefas`;
            mudarDiaFunc("Segunda");
        }
    }

    function adicionarTarefa() {
        const t = document.getElementById('adm-tarefa').value;
        if(!t) return alert("Escreva a tarefa!");
        db.tarefas.push({
            id: Date.now(),
            dataCriacao: obterDataDoDia(document.getElementById('adm-dia').value),
            andar: document.getElementById('adm-andar').value,
            tarefa: t,
            dia: document.getElementById('adm-dia').value,
            usuario: document.getElementById('adm-func').value,
            status: "Pendente",
            foto: null
        });
        salvarNoDisco(); renderAdmin();
        document.getElementById('adm-tarefa').value = "";
    }

    function renderAdmin() {
        const fFunc = document.getElementById('filtro-func').value;
        const fDia = document.getElementById('filtro-dia').value;
        const fStatus = document.getElementById('filtro-status').value;
        const filtradas = db.tarefas.filter(t => (fFunc === "todos" || t.usuario === fFunc) && (fDia === "todos" || t.dia === fDia) && (fStatus === "todos" || t.status === fStatus));

        document.getElementById('lista-geral').innerHTML = filtradas.map(t => {
            const statusClass = t.status === 'Concluído' ? 'concluido' : (t.status === 'Em andamento' ? 'andamento' : 'pendente');
            return `
            <div class="card ${statusClass}">
                <div class="info-tarefa">
                    <div class="badge-data-dark">${t.dataCriacao || '-'}</div>
                    <strong>${t.dia} | ${t.usuario}</strong>
                    <span>${t.andar}: ${t.tarefa}</span>
                    <div class="badge-status-pill">${t.status} ${t.status === 'Concluído' ? ` | ⏱️ ${t.horarioInicio || ''} ÀS ${t.horarioFim || ''} (${t.minutosTotais || 0}MIN)` : ''}</div>
                    ${t.foto ? `<img src="${t.foto}" class="img-anexo" onclick="verFoto(this.src)">` : ''}
                </div>
                <button onclick="excluirTarefa(${t.id})" style="width:auto; background:none; color:#999; font-size:18px">🗑️</button>
            </div>`;
        }).join('') || "<p style='text-align:center; color:#999'>Nenhuma tarefa encontrada.</p>";
    }

    function renderFunc() {
        const abas = document.getElementById('abas-dias');
        abas.innerHTML = diasSemana.map(d => `<div class="aba ${d === diaAtivoFunc ? 'ativa' : ''}" onclick="mudarDiaFunc('${d}')">${d}<span>${obterDataDoDia(d)}</span></div>`).join('');
        const lista = db.tarefas.filter(t => t.usuario === userAtivo && t.dia === diaAtivoFunc);
        
        document.getElementById('minhas-tarefas').innerHTML = lista.map(t => {
            const statusClass = t.status === 'Concluído' ? 'concluido' : (t.status === 'Em andamento' ? 'andamento' : 'pendente');
            let pillContent = t.status === 'Concluído' ? `CONCLUÍDO | ⏱️ ${t.horarioInicio} ÀS ${t.horarioFim} (${t.minutosTotais}MIN)` : (t.status === 'Em andamento' ? 'EM ANDAMENTO' : 'PENDENTE');

            return `
            <div class="card ${statusClass}">
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <button class="btn-circular" onclick="falar('${t.andar}: ${t.tarefa}')">📢</button>
                    <button class="btn-circular" onclick="tirarFoto(${t.id})">📷</button>
                </div>
                <div class="info-tarefa">
                    <div class="badge-data-dark">${t.dataCriacao || '-'}</div>
                    <strong>${t.andar}</strong>
                    <span>${t.tarefa}</span>
                    ${t.foto ? `<img src="${t.foto}" class="img-anexo" onclick="verFoto(this.src)">` : ''}
                    ${t.status === 'Em andamento' ? `<div class="cronometro" id="cron-${t.id}">00:00</div>` : ''}
                    <div class="badge-status-pill">${pillContent}</div>
                </div>
                <button class="${t.status === 'Em andamento' ? 'btn-success' : 'btn-main'}" style="width:85px; height:50px; border-radius:8px;" onclick="controlarTarefa(${t.id})">
                    ${t.status === 'Em andamento' ? 'FIM' : (t.status === 'Concluído' ? '✅' : 'INÍCIO')}
                </button>
            </div>`;
        }).join('') || "<div style='text-align:center; padding:20px; color:#999'>Sem tarefas.</div>";
    }

    function tirarFoto(id) {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max = 400; let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const t = db.tarefas.find(x => x.id == id);
                    t.foto = canvas.toDataURL('image/jpeg', 0.6);
                    salvarNoDisco(); renderFunc();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function controlarTarefa(id) {
        const t = db.tarefas.find(x => x.id == id);
        const agora = new Date();
        const horaFormatada = agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        if(t.status === "Pendente") {
            t.status = "Em andamento"; t.inicioMs = Date.now();
            t.horarioInicio = horaFormatada;
        } else if(t.status === "Em andamento"){
            t.status = "Concluído";
            t.horarioFim = horaFormatada;
            // Cálculo do tempo total em minutos
            const diffMs = Date.now() - t.inicioMs;
            t.minutosTotais = Math.floor(diffMs / 60000) || 1; // Pelo menos 1 minuto
        }
        salvarNoDisco(); renderFunc();
    }

    function verFoto(src) { document.getElementById('img-zoom').src = src; document.getElementById('modal-foto').style.display = 'flex'; }
    function mudarDiaFunc(d) { diaAtivoFunc = d; renderFunc(); }
    function salvarNoDisco() { localStorage.setItem('db_limpeza_pro', JSON.stringify(db)); }
    function excluirTarefa(id) { if(confirm("Remover?")) { db.tarefas = db.tarefas.filter(t => t.id != id); salvarNoDisco(); renderAdmin(); } }
    function limparBanco() { if(confirm("Apagar tudo?")) { localStorage.removeItem('db_limpeza_pro'); location.reload(); } }
    function resetarSenhas() { if(confirm("Resetar usuários?")) { db.usuarios = []; salvarNoDisco(); alert("Senhas resetadas!"); } }
    
    function novaSemana() { 
        if(confirm("Nova semana? (Isso limpa fotos e status)")) { 
            db.tarefas.forEach(t => { 
                t.status = "Pendente"; t.foto = null; 
                t.dataCriacao = obterDataDoDia(t.dia);
                t.horarioInicio = null; t.horarioFim = null; t.minutosTotais = null;
            }); 
            salvarNoDisco(); renderAdmin(); 
        } 
    }

    function atualizarCronometrosVisuais() {
        db.tarefas.forEach(t => {
            if(t.status === "Em andamento" && t.usuario === userAtivo) {
                const span = document.getElementById(`cron-${t.id}`);
                if(span) {
                    const seg = Math.floor((Date.now() - t.inicioMs) / 1000);
                    span.innerText = `⏱️ ${Math.floor(seg/60).toString().padStart(2,'0')}:${(seg%60).toString().padStart(2,'0')}`;
                }
            }
        });
    }

    function exportarCSV() {
        let csv = "Data;Dia;Funcionario;Andar;Tarefa;Status;DuracaoMin\n";
        db.tarefas.forEach(t => { csv += `${t.dataCriacao};${t.dia};${t.usuario};${t.andar};${t.tarefa};${t.status};${t.minutosTotais || 0}\n`; });
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob); link.download = `limpeza.csv`; link.click();
    }
</script>
</body>
</html>
